<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOᑌᘉᗞ Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial;
}

body{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0f0f0f;
  color:white;
}

.container{
  width:360px;
  padding:40px;
  border-radius:20px;
  background:rgba(18,18,18,0.55);
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,0.08);
}

.logo{
  text-align:center;
  font-size:28px;
  margin-bottom:20px;
}

h1{
  text-align:center;
  margin-bottom:25px;
}

.input-group{
  margin-bottom:15px;
}

.input-group input{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.06);
  color:white;
  outline:none;
}

button{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.08);
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

button:hover{
  background:rgba(255,255,255,0.18);
}

.toggle{
  margin-top:15px;
  text-align:center;
  font-size:14px;
  opacity:0.8;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">
  <div class="logo">🎧 SOᑌᘉᗞ</div>

  <h1 id="title">Entrar</h1>

  <div class="input-group">
    <input type="email" id="email" placeholder="Email">
  </div>

  <div class="input-group">
    <input type="password" id="senha" placeholder="Senha">
  </div>

  <button onclick="login()">Entrar</button>

  <button onclick="googleLogin()">Entrar com Google</button>

  <div class="toggle" onclick="toggleMode()">
    Criar conta
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.1/firebase-app.js";
import {
getAuth,
signInWithEmailAndPassword,
createUserWithEmailAndPassword,
GoogleAuthProvider,
signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.12.1/firebase-auth.js";

const firebaseConfig = {
apiKey: "AIzaSyCYxvghCciuFie4Z8qG0JsELoqMaZuXcoo",
authDomain: "soundpremiun-6f32c.firebaseapp.com",
projectId: "soundpremiun-6f32c",
storageBucket: "soundpremiun-6f32c.firebasestorage.app",
messagingSenderId: "627077390996",
appId: "1:627077390996:web:4daa434fbeddfe10f60a81"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

let isLogin = true;

window.toggleMode = () => {
isLogin = !isLogin;
document.getElementById("title").innerText = isLogin ? "Entrar" : "Criar Conta";
};

window.login = async () => {
const email = document.getElementById("email").value;
const senha = document.getElementById("senha").value;

try{
if(isLogin){
await signInWithEmailAndPassword(auth,email,senha);
window.location.href="dashboard.html";
}else{
await createUserWithEmailAndPassword(auth,email,senha);
window.location.href="dashboard.html";
}
}catch(e){
alert(e.message);
}
};

window.googleLogin = async () => {
const provider = new GoogleAuthProvider();
try{
await signInWithPopup(auth,provider);
window.location.href="dashboard.html";
}catch(e){
alert(e.message);
}
};
</script>

</body>
</html>
